name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt
            requirements/runtime.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e .
          pip install pytest

      - name: Check Runtime Boundary
        run: python scripts/check_runtime_boundary.py

      - name: Compile runtime modules
        run: python -m compileall langbridge scripts

      - name: Run backend tests
        run: |
          mkdir -p .cache/ci
          pytest -q tests

  runtime-package-builds:
    name: Runtime Package Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build runtime packages
        run: python scripts/build_runtime_packages.py --version 0.1.0

      - name: Validate built package metadata
        run: python -m twine check dist/runtime-packages/*
