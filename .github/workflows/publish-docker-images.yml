name: Publish Runtime Docker Images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-runtime-docker-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    name: Publish Docker Image (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: runtime
            file: docker/Dockerfile
            tag_prefix: ""
          - name: ui
            file: docker/Dockerfile.runtime_ui
            tag_prefix: "ui-"
    steps:
      - name: Resolve build source
        id: source
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          IMAGE_REPOSITORY: callumwhite/langbridge
          TAG_PREFIX: ${{ matrix.tag_prefix }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_BRANCH: ${{ steps.source.outputs.branch }}
          SOURCE_VERSION: ${{ steps.source.outputs.version }}
          IS_RELEASE: ${{ steps.source.outputs.is_release }}
        run: |
          SHORT_SHA="$(printf '%s' "$SOURCE_SHA" | cut -c1-12)"
          TAGS="${IMAGE_REPOSITORY}:${TAG_PREFIX}sha-${SHORT_SHA}"

          if [[ "$IS_RELEASE" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_REPOSITORY}:${TAG_PREFIX}${SOURCE_VERSION}"
            TAGS="${TAGS}"$'\n'"${IMAGE_REPOSITORY}:${TAG_PREFIX}latest"
          elif [[ "$SOURCE_BRANCH" == "main" || "$SOURCE_BRANCH" == "master" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_REPOSITORY}:${TAG_PREFIX}latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=langbridge
            org.opencontainers.image.description=Langbridge runtime image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
