name: Publish Runtime Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version to publish. Use stable semver for releases and dev+sha versions for previews."
        required: true
        type: string

jobs:
  publish:
    name: Publish Runtime Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.RUNTIME_CODEARTIFACT_PUBLISH_ROLE_ARN }}

      - name: Log in to CodeArtifact for Twine
        run: |
          aws codeartifact login \
            --tool twine \
            --domain "${{ vars.RUNTIME_CODEARTIFACT_DOMAIN }}" \
            --domain-owner "${{ vars.RUNTIME_CODEARTIFACT_DOMAIN_OWNER }}" \
            --repository "${{ vars.RUNTIME_CODEARTIFACT_REPOSITORY }}"

      - name: Build runtime packages
        run: |
          python scripts/build_runtime_packages.py \
            --version "${{ steps.version.outputs.value }}"

      - name: Validate built package metadata
        run: python -m twine check dist/runtime-packages/*

      - name: Publish runtime packages
        run: python -m twine upload dist/runtime-packages/*
