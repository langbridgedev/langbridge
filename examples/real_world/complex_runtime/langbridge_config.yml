version: 1

runtime:
  mode: local
  migrations:
    auto_apply: true
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/execution.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: commerce_warehouse
    type: sqlite
    description: Local commerce operations warehouse with order and product facts.
    connection:
      path: ./data/commerce.db

  - name: growth_warehouse
    type: sqlite
    description: Local growth and customer operations mart with profiles, attribution, and support data.
    connection:
      path: ./data/growth_ops.db

  - name: planning_files
    type: local_filesystem
    description: File-backed planning connector for monthly channel spend targets.
    connection: {}

datasets:
  - name: sales_orders
    label: Sales Orders
    description: Order-level commerce facts for revenue, refunds, channel mix, and margin analysis.
    connector: commerce_warehouse
    materialization:
      mode: live
    tags: [commerce, revenue, finance]
    source:
      kind: sql
      sql: |
        SELECT
          o.order_id,
          o.order_date,
          date(substr(o.order_date, 1, 7) || '-01') AS order_month,
          CAST(date(substr(o.order_date, 1, 4) || '-01-01') AS INTEGER) AS order_year,
          o.customer_id,
          o.order_channel,
          o.fulfillment_region,
          o.order_status,
          o.currency,
          o.gross_revenue,
          o.discount_amount,
          o.shipping_amount,
          o.refund_amount,
          o.net_revenue,
          o.gross_margin,
          CASE
            WHEN o.net_revenue = 0 THEN 0
            ELSE ROUND(o.gross_margin / o.net_revenue, 4)
          END AS margin_rate
        FROM orders AS o

  - name: order_line_items
    label: Order Line Items
    description: Product-level line item facts with product hierarchy and realized margin.
    connector: commerce_warehouse
    source:
      kind: sql
      sql: |
        SELECT
          li.line_id,
          li.line_id AS id,
          li.order_id,
          o.order_date,
          date(substr(o.order_date, 1, 7) || '-01') AS order_month,
          o.customer_id,
          o.order_channel,
          p.product_sku,
          p.product_name,
          p.category,
          p.subcategory,
          li.quantity,
          li.unit_price,
          li.net_line_revenue,
          li.line_margin
        FROM order_items AS li
        JOIN orders AS o
          ON o.order_id = li.order_id
        JOIN products AS p
          ON p.product_sku = li.product_sku
    materialization:
      mode: synced
      sync:
        strategy: INCREMENTAL
        cursor_field: order_date
        initial_cursor: "2025-01-01"
        sync_on_start: true
        cadence: 1h
    tags: [commerce, product]

  - name: customer_month_revenue
    label: Customer Month Revenue
    description: Customer-month-channel revenue rollup used for growth efficiency and conversion analysis.
    connector: commerce_warehouse
    materialization:
      mode: live
    tags: [growth, revenue, cohort]
    source:
      kind: sql
      sql: |
        SELECT
          CAST(customer_id AS TEXT) || '|' || substr(order_date, 1, 7) || '|' || order_channel AS customer_month_channel_key,
          customer_id,
          date(substr(order_date, 1, 7) || '-01') AS revenue_month,
          order_channel,
          substr(order_date, 1, 7) || '|' || order_channel AS channel_month_key,
          fulfillment_region,
          SUM(net_revenue) AS monthly_net_revenue,
          SUM(gross_margin) AS monthly_gross_margin,
          COUNT(*) AS monthly_order_count,
          SUM(CASE WHEN order_status <> 'fulfilled' THEN 1 ELSE 0 END) AS refunded_order_count
        FROM orders
        GROUP BY 1, 2, 3, 4, 5, 6

  - name: customer_profiles
    label: Customer Profiles
    description: Shared customer dimension with segment, lifecycle stage, region, and acquisition context.
    connector: growth_warehouse
    materialization:
      mode: live
    tags: [customer, dimension]
    source:
      kind: table
      table: customer_profiles

  - name: campaign_attribution
    label: Campaign Attribution
    description: Customer-month-channel attribution rollup with pipeline influence and assisted signups.
    connector: growth_warehouse
    materialization:
      mode: live
    tags: [growth, marketing]
    source:
      kind: table
      table: campaign_attribution_monthly

  - name: customer_month_support
    label: Customer Month Support
    description: Customer-month support load for pairing marketing and revenue outcomes with service pressure.
    connector: growth_warehouse
    materialization:
      mode: live
    tags: [support, customer]
    source:
      kind: sql
      sql: |
        SELECT
          CAST(customer_id AS TEXT) || '|' || substr(opened_date, 1, 7) AS customer_month_key,
          customer_id,
          date(substr(opened_date, 1, 7) || '-01') AS support_month,
          MIN(ticket_type) AS dominant_ticket_type,
          COUNT(*) AS ticket_count,
          SUM(CASE WHEN severity = 'high' THEN 1 ELSE 0 END) AS high_severity_tickets,
          SUM(resolution_hours) AS resolution_hours_total
        FROM support_tickets
        GROUP BY 1, 2, 3

  - name: channel_spend_targets
    label: Channel Spend Targets
    description: Monthly channel spend plan and demand targets from a local CSV file.
    connector: planning_files
    materialization:
      mode: live
    tags: [growth, finance, planning]
    source:
      kind: file
      path: ./data/channel_spend_targets.csv
      format: csv
      header: true

semantic_models:
  - name: commerce_performance
    description: Multi-dataset commerce model spanning order facts, product lines, and customer segmentation.
    default: true
    model:
      version: "1"
      name: commerce_performance
      description: Governed commerce model for revenue, margin, product mix, and customer segment analysis.
      datasets:
        sales_orders:
          relation_name: sales_orders
          description: Order-level commerce fact dataset.
          dimensions:
            - name: order_id
              expression: order_id
              type: string
              primary_key: true
              vector:
                enabled: true
                refresh_interval: 5m
            - name: order_date
              expression: order_date
              type: time
            - name: order_month
              expression: order_month
              type: string
            - name: order_year
              expression: order_year
              type: number
            - name: customer_id
              expression: customer_id
              type: number
            - name: order_channel
              expression: order_channel
              type: string
            - name: fulfillment_region
              expression: fulfillment_region
              type: string
            - name: order_status
              expression: order_status
              type: string
            - name: currency
              expression: currency
              type: string
          measures:
            - name: gross_revenue
              expression: gross_revenue
              type: number
              aggregation: sum
            - name: discount_amount
              expression: discount_amount
              type: number
              aggregation: sum
            - name: refund_amount
              expression: refund_amount
              type: number
              aggregation: sum
            - name: net_revenue
              expression: net_revenue
              type: number
              aggregation: sum
              synonyms: [sales, revenue]
            - name: gross_margin
              expression: gross_margin
              type: number
              aggregation: sum
            - name: order_count
              expression: order_id
              type: number
              aggregation: count

        order_line_items:
          relation_name: order_line_items
          description: Product line detail for mix and profitability analysis.
          dimensions:
            - name: line_id
              expression: line_id
              type: string
              primary_key: true
            - name: order_id
              expression: order_id
              type: string
            - name: order_date
              expression: order_date
              type: time
            - name: order_month
              expression: order_month
              type: time
            - name: customer_id
              expression: customer_id
              type: number
            - name: order_channel
              expression: order_channel
              type: string
            - name: product_sku
              expression: product_sku
              type: string
            - name: product_name
              expression: product_name
              type: string
            - name: category
              expression: category
              type: string
            - name: subcategory
              expression: subcategory
              type: string
          measures:
            - name: units_sold
              expression: quantity
              type: number
              aggregation: sum
            - name: line_net_revenue
              expression: net_line_revenue
              type: number
              aggregation: sum
            - name: line_margin
              expression: line_margin
              type: number
              aggregation: sum

        customer_profiles:
          relation_name: customer_profiles
          description: Shared customer dimension for segmentation and lifecycle analysis.
          dimensions:
            - name: customer_id
              expression: customer_id
              type: number
              primary_key: true
            - name: customer_name
              expression: customer_name
              type: string
            - name: segment
              expression: segment
              type: string
            - name: lifecycle_stage
              expression: lifecycle_stage
              type: string
            - name: acquisition_source
              expression: acquisition_source
              type: string
            - name: region
              expression: region
              type: string
            - name: country
              expression: country
              type: string
            - name: signup_date
              expression: signup_date
              type: time
            - name: account_manager
              expression: account_manager
              type: string
          measures:
            - name: customer_count
              expression: customer_id
              type: number
              aggregation: count

        channel_spend_targets:
          relation_name: channel_spend_targets
          description: Monthly channel spend targets for growth efficiency analysis.
          dimensions:
            - name: channel_month_key
              expression: channel_month_key
              type: string
              primary_key: true
            - name: order_channel
              expression: order_channel
              type: string
            - name: spend_month
              expression: spend_month
              type: time
          measures:
            - name: spend_target
              expression: spend_amount
              type: number
              aggregation: sum

      relationships:
        - name: sales_orders_to_customers
          source_dataset: sales_orders
          source_field: customer_id
          target_dataset: customer_profiles
          target_field: customer_id
          type: many_to_one
        - name: line_items_to_orders
          source_dataset: order_line_items
          source_field: order_id
          target_dataset: sales_orders
          target_field: order_id
          type: many_to_one
        - name: spend_targets_to_orders
          source_dataset: channel_spend_targets
          source_field: spend_month
          target_dataset: sales_orders
          target_field: order_month
          type: many_to_one

  - name: growth_performance
    description: Multi-connector growth model joining customer revenue, attribution, and spend planning.
    model:
      version: "1"
      name: growth_performance
      description: Growth model for spend efficiency, influenced pipeline, and customer cohort performance.
      datasets:
        customer_month_revenue:
          relation_name: customer_month_revenue
          description: Customer-month-channel revenue grain used for conversion and efficiency analysis.
          dimensions:
            - name: customer_month_channel_key
              expression: customer_month_channel_key
              type: string
              primary_key: true
            - name: customer_id
              expression: customer_id
              type: number
            - name: revenue_month
              expression: revenue_month
              type: time
            - name: order_channel
              expression: order_channel
              type: string
            - name: channel_month_key
              expression: channel_month_key
              type: string
            - name: fulfillment_region
              expression: fulfillment_region
              type: string
          measures:
            - name: monthly_net_revenue
              expression: monthly_net_revenue
              type: number
              aggregation: sum
            - name: monthly_gross_margin
              expression: monthly_gross_margin
              type: number
              aggregation: sum
            - name: monthly_order_count
              expression: monthly_order_count
              type: number
              aggregation: sum
            - name: refunded_order_count
              expression: refunded_order_count
              type: number
              aggregation: sum

        customer_profiles:
          relation_name: customer_profiles
          description: Customer segmentation and lifecycle dimension.
          dimensions:
            - name: customer_id
              expression: customer_id
              type: number
              primary_key: true
            - name: customer_name
              expression: customer_name
              type: string
            - name: segment
              expression: segment
              type: string
            - name: lifecycle_stage
              expression: lifecycle_stage
              type: string
            - name: acquisition_source
              expression: acquisition_source
              type: string
            - name: region
              expression: region
              type: string
            - name: country
              expression: country
              type: string
            - name: signup_date
              expression: signup_date
              type: time
            - name: account_manager
              expression: account_manager
              type: string
          measures:
            - name: customer_count
              expression: customer_id
              type: number
              aggregation: count

        campaign_attribution:
          relation_name: campaign_attribution
          description: Customer-month-channel attribution facts.
          dimensions:
            - name: customer_month_channel_key
              expression: customer_month_channel_key
              type: string
              primary_key: true
            - name: customer_id
              expression: customer_id
              type: number
            - name: attribution_month
              expression: attribution_month
              type: time
            - name: acquisition_channel
              expression: acquisition_channel
              type: string
            - name: channel_month_key
              expression: channel_month_key
              type: string
            - name: primary_campaign
              expression: primary_campaign
              type: string
            - name: funnel_stage
              expression: funnel_stage
              type: string
          measures:
            - name: attributed_touches
              expression: attributed_touches
              type: number
              aggregation: sum
            - name: influenced_pipeline
              expression: influenced_pipeline
              type: number
              aggregation: sum
            - name: assisted_signups
              expression: assisted_signups
              type: number
              aggregation: sum

      relationships:
        - name: revenue_to_profiles
          source_dataset: customer_month_revenue
          source_field: customer_id
          target_dataset: customer_profiles
          target_field: customer_id
          type: many_to_one
        - name: attribution_to_profiles
          source_dataset: campaign_attribution
          source_field: customer_id
          target_dataset: customer_profiles
          target_field: customer_id
          type: many_to_one
        - name: revenue_to_attribution
          source_dataset: customer_month_revenue
          source_field: customer_month_channel_key
          target_dataset: campaign_attribution
          target_field: customer_month_channel_key
          type: many_to_one

llm_connections:
  - name: self_hosted_openai
    provider: openai
    model: gpt-5.4
    default: true
    api_key_secret:
      provider_type: env
      identifier: OPENAI_API_KEY

ai:
  profiles:
    - name: commerce_analyst
      description: Operator-focused commerce analyst for order mix, revenue, refunds, and product profitability.
      llm:
        llm_connection: self_hosted_openai
      scope:
        semantic_models: [commerce_performance]
        datasets: [sales_orders, order_line_items, customer_profiles]
      prompts:
        system: You are a Langbridge commerce analyst embedded in a self-hosted analytics runtime.
        user: |
          Prioritize sales, margin, refunds, fulfillment region, and product mix analysis.
          Stay inside the commerce domain unless the user explicitly asks for customer segmentation context.
          When comparing periods, point out the main operational driver behind the change.
        presentation: Explain tradeoffs between efficiency and scale, and separate proven findings from inference. Please format all numbers with commas and no decimal places unless the number is less than 1,000. And with the currency (which is GBP)
      research:
        enabled: true
        extended_thinking: true
        max_sources: 8
        require_sources: false

      web_search:
        enabled: true
        provider: duckduckgo
        require_allowed_domain: false
        max_results: 10
        timebox_seconds: 10
      exposure:
        runtime: true
        mcp: true
      access:
        allowed_connectors: [commerce_warehouse, growth_warehouse]
        denied_connectors: [planning_files]
      execution:
        max_iterations: 10

    - name: growth_analyst
      description: Growth and customer operations analyst for acquisition, spend efficiency, and lifecycle conversion.
      llm:
        llm_connection: self_hosted_openai
      scope:
        semantic_models: [growth_performance]
        datasets: [customer_month_revenue, campaign_attribution, channel_spend_targets, customer_month_support, customer_profiles]
        query_policy: semantic_preferred
      research:
        enabled: true
      web_search:
        enabled: true
        provider: duckduckgo
        allowed_domains: [shopify.com, stripe.com, nrf.com, census.gov]
        require_allowed_domain: true
        max_results: 5
        timebox_seconds: 10
      prompts:
        system: You are a Langbridge growth analyst embedded in a self-hosted analytics runtime.
        user: |
          Focus on campaign efficiency, influenced pipeline, segment performance, customer conversion, and support burden.
          Prefer the growth semantic model for governed answers and fall back to scoped dataset SQL only when needed.
          Treat spend, pipeline, and revenue as one joined story and call out data grain when it matters.
        presentation: Explain tradeoffs between efficiency and scale, and separate proven findings from inference. Please format all numbers with commas and no decimal places unless the number is less than 1,000. Please add the curreny symbol (which is £) to all revenue and spend figures.
      exposure:
        runtime: true
        mcp: true
      access:
        allowed_connectors: [commerce_warehouse, growth_warehouse, planning_files]
        denied_connectors: []
      execution:
        max_iterations: 4
