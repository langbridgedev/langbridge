version: 1

runtime:
  mode: local
  migrations:
    # Local/self-hosted defaults can auto-apply runtime metadata migrations on serve.
    auto_apply: true
  # Explicit runtime metadata persistence. If omitted, configured runtimes now
  # default to sqlite at .langbridge/metadata.db relative to this config.
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/execution.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: commerce_demo
    type: sqlite
    connection:
      path: ../../sdk/semantic_query/example.db

datasets:
  - name: shopify_orders
    label: Shopify Orders
    description: Order-level commerce performance data with revenue and customer attributes.
    connector: commerce_demo
    materialization:
      mode: live
    source:
      kind: table
      table: orders_enriched

semantic_models:
  - name: commerce_performance
    description: Runtime-host demo semantic model
    default: true
    model:
      version: "1"
      name: commerce_performance
      description: Commerce performance model for the hosted runtime example.
      datasets:
        shopify_orders:
          relation_name: orders_enriched
          dimensions:
            - name: country
              expression: country
              type: string
            - name: order_date
              expression: order_date
              type: time
            - name: acquisition_channel
              expression: acquisition_channel
              type: string
            - name: loyalty_tier
              expression: loyalty_tier
              type: string
          measures:
            - name: net_sales
              expression: net_revenue
              type: number
              aggregation: sum
            - name: gross_margin
              expression: gross_margin
              type: number
              aggregation: sum
            - name: order_count
              expression: order_id
              type: number
              aggregation: count

llm_connections:
  - name: local_openai
    provider: openai
    model: gpt-5.4
    default: true
    api_key_secret:
      provider_type: env
      identifier: OPENAI_API_KEY

ai:
  profiles:
    - name: commerce_analyst
      description: Default analytics agent for the runtime host example.
      llm:
        llm_connection: local_openai
      scope:
        semantic_models: [commerce_performance]
      prompts:
        system: You are a Langbridge analytics agent.
        user: |
          Focus on net sales, margin, country, channel, and loyalty questions.
        presentation: Keep answers concise and clearly grounded in query results.
      access:
        allowed_connectors: [commerce_demo]
        denied_connectors: []
      execution:
        max_iterations: 3
        audit_fields: []
