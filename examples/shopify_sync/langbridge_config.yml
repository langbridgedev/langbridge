version: 1

runtime:
  mode: local
  # Explicit runtime metadata persistence for the synced datasets and sync state.
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/runtime.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: shopify_demo
    type: shopify
    description: Self-hosted Shopify sync example backed by a live Shopify Admin API store.
    connection: {}
    secrets:
      shop_domain:
        provider_type: env
        identifier: SHOPIFY_SHOP_DOMAIN
      access_token:
        provider_type: env
        identifier: SHOPIFY_ACCESS_TOKEN

datasets:
  - name: shopify_products
    description: Synced dataset pinned to the manifest-listed Shopify products resource.
    connector: shopify_demo
    materialization_mode: synced
    # materialization_mode: live
    # source:
    #   resource: products
    sync:
      resource: products
      flattern_into_datasets: false
      
  - name: shopify_products__options
    description: Synced dataset pinned to the manifest-listed Shopify products__options resource.
    connector: shopify_demo
    materialization_mode: synced
    # materialization_mode: live
    # source:
    #   resource: products
    sync:
      resource: product/products_options
      flattern_into_datasets: false

  - name: shopify_price_rules
    description: Synced dataset using a dataset-selected dynamic Shopify Admin API resource.
    connector: shopify_demo
    # materialization_mode: live
    materialization_mode: synced
    # source:
    #   resource: price_rules
    sync:
      resource: price_rules
      flattern_into_datasets: false
