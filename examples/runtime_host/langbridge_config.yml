version: 1

runtime:
  mode: local
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/execution.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: commerce_demo
    type: sqlite
    connection:
      path: ../sdk/semantic_query/example.db

datasets:
  - name: shopify_orders
    label: Shopify Orders
    description: Order-level commerce performance data with revenue and customer attributes.
    connector: commerce_demo
    semantic_model: commerce_performance
    default_time_dimension: order_date
    source:
      table: orders_enriched
    sync:
      enabled: false

semantic_models:
  - name: commerce_performance
    description: Runtime-host demo semantic model
    default: true
    model:
      version: "1"
      name: commerce_performance
      description: Commerce performance model for the hosted runtime example.
      datasets:
        shopify_orders:
          relation_name: orders_enriched
          dimensions:
            - name: country
              expression: country
              type: string
            - name: order_date
              expression: order_date
              type: time
            - name: acquisition_channel
              expression: acquisition_channel
              type: string
            - name: loyalty_tier
              expression: loyalty_tier
              type: string
          measures:
            - name: net_sales
              expression: net_revenue
              type: number
              aggregation: sum
            - name: gross_margin
              expression: gross_margin
              type: number
              aggregation: sum
            - name: order_count
              expression: order_id
              type: number
              aggregation: count

llm_connections:
  - name: local_openai
    provider: openai
    model: gpt-5.4
    default: true
    api_key_secret:
      provider_type: env
      identifier: OPENAI_API_KEY

agents:
  - name: commerce_analyst
    description: Default analytics agent for the runtime host example.
    llm_connection: local_openai
    default: true
    definition:
      prompt:
        system_prompt: You are a Langbridge analytics agent.
        user_instructions: |
          Focus on net sales, margin, country, channel, and loyalty questions.
        style_guidance: Keep answers concise and clearly grounded in query results.
      memory:
        strategy: database
      features:
        bi_copilot_enabled: false
        deep_research_enabled: false
        visualization_enabled: true
        mcp_enabled: false
      tools:
        - name: commerce_semantic_sql
          tool_type: sql
          description: Governed semantic analytics access for the commerce model.
          config:
            semantic_model_ids: [commerce_performance]
      access_policy:
        allowed_connectors: [commerce_demo]
        denied_connectors: []
      execution:
        mode: iterative
        response_mode: analyst
        max_iterations: 3
        max_steps_per_iteration: 5
        allow_parallel_tools: false
      output:
        format: markdown
      guardrails:
        moderation_enabled: true
      observability:
        log_level: info
        emit_traces: false
        capture_prompts: false
        audit_fields: []
