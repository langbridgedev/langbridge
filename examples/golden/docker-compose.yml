services:
  sales-db:
    image: postgres:16-alpine
    container_name: golden-shopify-sales-db
    environment:
      POSTGRES_USER: reporting_user
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: shopify_sales
    volumes:
      - golden_sales_pg_data:/var/lib/postgresql/data
      - ./seeds/sales:/docker-entrypoint-initdb.d:ro
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting_user -d shopify_sales"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  golden_sales_pg_data:
