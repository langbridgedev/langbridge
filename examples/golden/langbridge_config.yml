version: 1

runtime:
  mode: local
  migrations:
    auto_apply: true
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/execution.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: weather_http_demo
    type: BASIC_HTTP
    description: Keyless Open-Meteo current weather dataset for Shopify store locations.
    connection:
      api_base_url: https://api.open-meteo.com
      auth_type: none
      timeout_s: 30

  - name: shopify_demo
    type: shopify
    description: Shopify analytics-safe synced dataset example using explicit REST resource paths.
    secrets:
      shop_domain:
        provider_type: env
        identifier: SHOPIFY_SHOP_DOMAIN
      access_token:
        provider_type: env
        identifier: SHOPIFY_ACCESS_TOKEN

  - name: sales_postgres
    type: postgres
    description: Local Docker Postgres sales database seeded from synced Shopify product and variant IDs.
    connection:
      host: localhost
      port: 55432
      database: shopify_sales
      user: reporting_user
      password: securepassword

  - name: planning_files
    type: file
    description: File-backed planning connector for product campaign targets.
    connection: {}

datasets:
  # - name: store_weather_snapshot
  #   label: Store Weather Snapshot
  #   description: Current Open-Meteo weather snapshot for Toronto and London store regions.
  #   connector: weather_http_demo
  #   source:
  #     kind: request
  #     request:
  #       method: get
  #       path: /v1/forecast
  #       params:
  #         latitude: "43.6532,51.5072"
  #         longitude: "-79.3832,-0.1276"
  #         current: temperature_2m,precipitation,weather_code,wind_speed_10m
  #         temperature_unit: fahrenheit
  #         wind_speed_unit: mph
  #         timezone: auto
  #         forecast_days: 1
  #     flatten:
  #       - current
  #       - current_units
  #   materialization:
  #     mode: synced
  #     sync:
  #       strategy: FULL_REFRESH
  #       sync_on_start: true
  #       cadence: 1h

  - name: shopify_products
    description: Synced parent dataset for Shopify products.
    connector: shopify_demo
    source:
      kind: resource
      resource: products
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_product_variants
    description: Synced child dataset for product variants from `products.variants`.
    connector: shopify_demo
    source:
      kind: resource
      resource: products.variants
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_product_options
    description: Synced child dataset for product options from `products.options`.
    connector: shopify_demo
    source:
      kind: resource
      resource: products.options
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_product_images
    description: Synced child dataset for product images from `products.images`.
    connector: shopify_demo
    source:
      kind: resource
      resource: products.images
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_custom_collections
    description: Synced dataset for Shopify custom collections.
    connector: shopify_demo
    source:
      kind: resource
      resource: custom_collections
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_smart_collections
    description: Synced dataset for Shopify smart collections.
    connector: shopify_demo
    source:
      kind: resource
      resource: smart_collections
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_collects
    description: Synced dataset mapping products to custom collections.
    connector: shopify_demo
    source:
      kind: resource
      resource: collects
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_locations
    description: Synced dataset for Shopify locations.
    connector: shopify_demo
    source:
      kind: resource
      resource: locations
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: shopify_price_rules
    description: Synced dataset for Shopify price rules.
    connector: shopify_demo
    source:
      kind: resource
      resource: price_rules
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true

  - name: sales_customers
    label: Sales Customers
    description: Customer records from the local Postgres sales database.
    connector: sales_postgres
    materialization:
      mode: live
    source:
      kind: table
      table: sales_customers

  - name: sales_orders
    label: Sales Orders
    description: Order-level facts from the local Postgres sales database.
    connector: sales_postgres
    materialization:
      mode: live
    source:
      kind: sql
      sql: |
        SELECT
          id AS order_id,
          order_number,
          customer_id,
          CAST(order_ts AS DATE) AS order_date,
          channel,
          status,
          fulfillment_location_name,
          fulfillment_location_country,
          subtotal,
          discount,
          tax,
          shipping,
          total
        FROM sales_orders
        WHERE status <> 'cancelled'

  - name: sales_order_items
    label: Sales Order Items
    description: Line-item sales facts keyed to synced Shopify product and variant IDs.
    connector: sales_postgres
    materialization:
      mode: live
    source:
      kind: sql
      sql: |
        SELECT
          id AS order_item_id,
          order_id,
          shopify_product_id,
          shopify_variant_id,
          sku,
          quantity,
          unit_price,
          discount,
          line_total
        FROM sales_order_items

  - name: product_campaign_plan
    label: Product Campaign Plan
    description: Product-level merchandising campaign targets from a local CSV file.
    connector: planning_files
    materialization:
      mode: live
    tags: [growth, finance, planning, csv]
    source:
      kind: file
      path: ./data/product_campaign_plan.csv
      format: csv
      header: true

semantic_models:
  - name: shopify_sales_demo
    description: Golden demo model spanning synced Shopify catalog, Postgres sales facts, CSV campaign plans, and weather API data.
    default: true
    datasets:
      - shopify_products
      - shopify_product_variants
      - shopify_product_options
      - shopify_product_images
      - shopify_custom_collections
      - shopify_smart_collections
      - shopify_collects
      - shopify_locations
      - shopify_price_rules
      - sales_customers
      - sales_orders
      - sales_order_items
      - product_campaign_plan
    model:
      version: "1"
      name: shopify_sales_demo
      description: Governed demo model for Shopify catalog, sales, campaign, and weather analysis.
      sql_instructions: |
        Shopify REST fields such as variant price and price rule value may arrive as strings.
        Use the numeric semantic measures for price, discount, sales, and plan calculations.
      datasets:
        shopify_products:
          relation_name: shopify_products
          description: Product-level catalog records synced from Shopify products.
          dimensions:
            - name: product_id
              expression: id
              type: number
              primary_key: true
              synonyms: [id]
            - name: product_title
              expression: title
              type: string
              synonyms: [product, name]
              vector:
                enabled: true
                refresh_interval: 5m
            - name: vendor
              expression: vendor
              type: string
              synonyms: [brand, supplier]
            - name: product_type
              expression: product_type
              type: string
              synonyms: [category, type]
            - name: status
              expression: status
              type: string
            - name: handle
              expression: handle
              type: string
            - name: tags
              expression: tags
              type: string
            - name: created_at
              expression: created_at
              type: time
            - name: updated_at
              expression: updated_at
              type: time
            - name: published_at
              expression: published_at
              type: time
          measures:
            - name: product_count
              expression: id
              type: number
              aggregation: count
              synonyms: [products]

        shopify_product_variants:
          relation_name: shopify_product_variants
          description: Product variant records expanded from products.variants.
          dimensions:
            - name: variant_id
              expression: id
              type: number
              primary_key: true
            - name: product_id
              expression: product_id
              type: number
            - name: variant_title
              expression: title
              type: string
              synonyms: [variant, name]
            - name: sku
              expression: sku
              type: string
            - name: option1
              expression: option1
              type: string
            - name: inventory_policy
              expression: inventory_policy
              type: string
            - name: inventory_management
              expression: inventory_management
              type: string
            - name: taxable
              expression: taxable
              type: boolean
            - name: requires_shipping
              expression: requires_shipping
              type: boolean
            - name: weight_unit
              expression: weight_unit
              type: string
            - name: created_at
              expression: created_at
              type: time
            - name: updated_at
              expression: updated_at
              type: time
          measures:
            - name: variant_count
              expression: id
              type: number
              aggregation: count
            - name: total_inventory_quantity
              expression: inventory_quantity
              type: number
              aggregation: sum
              synonyms: [inventory, stock, quantity on hand]
            - name: average_variant_price
              expression: CAST(shopify_product_variants.price AS DOUBLE)
              type: number
              aggregation: avg
              synonyms: [average price, avg price]
            - name: maximum_variant_price
              expression: CAST(shopify_product_variants.price AS DOUBLE)
              type: number
              aggregation: max
            - name: minimum_variant_price
              expression: CAST(shopify_product_variants.price AS DOUBLE)
              type: number
              aggregation: min
            - name: total_variant_weight
              expression: weight
              type: number
              aggregation: sum

        shopify_product_options:
          relation_name: shopify_product_options
          description: Product option records expanded from products.options.
          dimensions:
            - name: option_id
              expression: id
              type: number
              primary_key: true
            - name: product_id
              expression: product_id
              type: number
            - name: option_name
              expression: name
              type: string
            - name: position
              expression: position
              type: number
          measures:
            - name: option_count
              expression: id
              type: number
              aggregation: count

        shopify_product_images:
          relation_name: shopify_product_images
          description: Product image records expanded from products.images.
          dimensions:
            - name: image_id
              expression: id
              type: number
              primary_key: true
            - name: product_id
              expression: product_id
              type: number
            - name: alt_text
              expression: alt
              type: string
            - name: image_url
              expression: src
              type: string
            - name: position
              expression: position
              type: number
            - name: created_at
              expression: created_at
              type: time
            - name: updated_at
              expression: updated_at
              type: time
          measures:
            - name: image_count
              expression: id
              type: number
              aggregation: count
            - name: average_image_width
              expression: width
              type: number
              aggregation: avg
            - name: average_image_height
              expression: height
              type: number
              aggregation: avg

        shopify_custom_collections:
          relation_name: shopify_custom_collections
          description: Manually curated Shopify custom collections.
          dimensions:
            - name: collection_id
              expression: id
              type: number
              primary_key: true
            - name: collection_title
              expression: title
              type: string
            - name: handle
              expression: handle
              type: string
            - name: sort_order
              expression: sort_order
              type: string
            - name: published_scope
              expression: published_scope
              type: string
            - name: updated_at
              expression: updated_at
              type: time
            - name: published_at
              expression: published_at
              type: time
          measures:
            - name: custom_collection_count
              expression: id
              type: number
              aggregation: count

        shopify_smart_collections:
          relation_name: shopify_smart_collections
          description: Rule-driven Shopify smart collections.
          dimensions:
            - name: collection_id
              expression: id
              type: number
              primary_key: true
            - name: collection_title
              expression: title
              type: string
            - name: handle
              expression: handle
              type: string
            - name: sort_order
              expression: sort_order
              type: string
            - name: disjunctive
              expression: disjunctive
              type: boolean
            - name: updated_at
              expression: updated_at
              type: time
            - name: published_at
              expression: published_at
              type: time
          measures:
            - name: smart_collection_count
              expression: id
              type: number
              aggregation: count

        shopify_collects:
          relation_name: shopify_collects
          description: Product-to-custom-collection membership records.
          dimensions:
            - name: collect_id
              expression: id
              type: number
              primary_key: true
            - name: collection_id
              expression: collection_id
              type: number
            - name: product_id
              expression: product_id
              type: number
            - name: position
              expression: position
              type: number
            - name: sort_value
              expression: sort_value
              type: string
            - name: created_at
              expression: created_at
              type: time
            - name: updated_at
              expression: updated_at
              type: time
          measures:
            - name: collect_count
              expression: id
              type: number
              aggregation: count

        shopify_locations:
          relation_name: shopify_locations
          description: Shopify fulfillment and inventory locations.
          dimensions:
            - name: location_id
              expression: id
              type: number
              primary_key: true
            - name: location_name
              expression: name
              type: string
              synonyms: [location, warehouse]
            - name: city
              expression: city
              type: string
            - name: province
              expression: province
              type: string
            - name: country
              expression: country
              type: string
            - name: country_name
              expression: country_name
              type: string
            - name: zip
              expression: zip
              type: string
            - name: active
              expression: active
              type: boolean
            - name: created_at
              expression: created_at
              type: time
            - name: updated_at
              expression: updated_at
              type: time
          measures:
            - name: location_count
              expression: id
              type: number
              aggregation: count

        shopify_price_rules:
          relation_name: shopify_price_rules
          description: Shopify discount and price rule configuration.
          dimensions:
            - name: price_rule_id
              expression: id
              type: number
              primary_key: true
            - name: title
              expression: title
              type: string
              synonyms: [discount, price rule, promotion]
            - name: value_type
              expression: value_type
              type: string
            - name: target_type
              expression: target_type
              type: string
            - name: target_selection
              expression: target_selection
              type: string
            - name: allocation_method
              expression: allocation_method
              type: string
            - name: customer_selection
              expression: customer_selection
              type: string
            - name: once_per_customer
              expression: once_per_customer
              type: boolean
            - name: created_at
              expression: created_at
              type: time
            - name: updated_at
              expression: updated_at
              type: time
            - name: starts_at
              expression: starts_at
              type: time
            - name: ends_at
              expression: ends_at
              type: time
          measures:
            - name: price_rule_count
              expression: id
              type: number
              aggregation: count
            - name: average_discount_value
              expression: CAST(shopify_price_rules.value AS DOUBLE)
              type: number
              aggregation: avg
            - name: maximum_discount_value
              expression: CAST(shopify_price_rules.value AS DOUBLE)
              type: number
              aggregation: max

        sales_customers:
          relation_name: sales_customers
          description: Customer records from the seeded Postgres sales database.
          dimensions:
            - name: customer_id
              expression: id
              type: number
              primary_key: true
            - name: customer_key
              expression: customer_key
              type: string
            - name: country
              expression: country
              type: string
            - name: region
              expression: region
              type: string
            - name: loyalty_tier
              expression: loyalty_tier
              type: string
            - name: marketing_opt_in
              expression: marketing_opt_in
              type: boolean
            - name: created_at
              expression: created_at
              type: time
          measures:
            - name: customer_count
              expression: id
              type: number
              aggregation: count

        sales_orders:
          relation_name: sales_orders
          description: Order records from the seeded Postgres sales database.
          dimensions:
            - name: order_id
              expression: order_id
              type: number
              primary_key: true
            - name: order_number
              expression: order_number
              type: string
            - name: customer_id
              expression: customer_id
              type: number
            - name: order_date
              expression: order_date
              type: time
            - name: channel
              expression: channel
              type: string
            - name: status
              expression: status
              type: string
            - name: fulfillment_location_name
              expression: fulfillment_location_name
              type: string
            - name: fulfillment_location_country
              expression: fulfillment_location_country
              type: string
          measures:
            - name: order_count
              expression: order_id
              type: number
              aggregation: count
            - name: order_total
              expression: total
              type: number
              aggregation: sum
            - name: order_discount
              expression: discount
              type: number
              aggregation: sum
            - name: shipping_revenue
              expression: shipping
              type: number
              aggregation: sum

        sales_order_items:
          relation_name: sales_order_items
          description: Sales line items linked to Shopify products and variants.
          dimensions:
            - name: order_item_id
              expression: order_item_id
              type: number
              primary_key: true
            - name: order_id
              expression: order_id
              type: number
            - name: shopify_product_id
              expression: shopify_product_id
              type: number
            - name: shopify_variant_id
              expression: shopify_variant_id
              type: number
            - name: sku
              expression: sku
              type: string
          measures:
            - name: units_sold
              expression: quantity
              type: number
              aggregation: sum
              synonyms: [units, quantity sold]
            - name: net_sales
              expression: line_total
              type: number
              aggregation: sum
              synonyms: [sales, revenue, line revenue]
            - name: line_discount
              expression: discount
              type: number
              aggregation: sum
            - name: average_unit_price
              expression: unit_price
              type: number
              aggregation: avg

        product_campaign_plan:
          relation_name: product_campaign_plan
          description: Product campaign targets from CSV.
          dimensions:
            - name: shopify_product_id
              expression: shopify_product_id
              type: number
              primary_key: true
            - name: product_title_snapshot
              expression: product_title_snapshot
              type: string
            - name: campaign_name
              expression: campaign_name
              type: string
            - name: campaign_channel
              expression: campaign_channel
              type: string
            - name: offer_type
              expression: offer_type
              type: string
            - name: target_region
              expression: target_region
              type: string
            - name: start_date
              expression: start_date
              type: time
            - name: end_date
              expression: end_date
              type: time
          measures:
            - name: planned_units
              expression: planned_units
              type: number
              aggregation: sum
            - name: planned_spend
              expression: planned_spend
              type: number
              aggregation: sum
      relationships:
        - name: sales_items_to_campaign_plan
          source_dataset: sales_order_items
          source_field: shopify_product_id
          target_dataset: product_campaign_plan
          target_field: shopify_product_id
          type: many_to_one
        - name: sales_items_to_orders
          source_dataset: sales_order_items
          source_field: order_id
          target_dataset: sales_orders
          target_field: order_id
          type: many_to_one
        - name: sales_orders_to_customers
          source_dataset: sales_orders
          source_field: customer_id
          target_dataset: sales_customers
          target_field: id
          type: many_to_one
        - name: sales_items_to_shopify_products
          source_dataset: sales_order_items
          source_field: shopify_product_id
          target_dataset: shopify_products
          target_field: id
          type: many_to_one
        - name: sales_items_to_shopify_variants
          source_dataset: sales_order_items
          source_field: shopify_variant_id
          target_dataset: shopify_product_variants
          target_field: id
          type: many_to_one
        - name: variants_to_products
          source_dataset: shopify_product_variants
          source_field: product_id
          target_dataset: shopify_products
          target_field: id
          type: many_to_one
        - name: options_to_products
          source_dataset: shopify_product_options
          source_field: product_id
          target_dataset: shopify_products
          target_field: id
          type: many_to_one
        - name: images_to_products
          source_dataset: shopify_product_images
          source_field: product_id
          target_dataset: shopify_products
          target_field: id
          type: many_to_one
        - name: collects_to_products
          source_dataset: shopify_collects
          source_field: product_id
          target_dataset: shopify_products
          target_field: id
          type: many_to_one
        - name: collects_to_custom_collections
          source_dataset: shopify_collects
          source_field: collection_id
          target_dataset: shopify_custom_collections
          target_field: id
          type: many_to_one
        - name: campaign_plan_to_products
          source_dataset: product_campaign_plan
          source_field: shopify_product_id
          target_dataset: shopify_products
          target_field: id
          type: many_to_one

llm_connections:
  - name: self_hosted_openai
    provider: openai
    model: gpt-5.4
    default: true
    api_key_secret:
      provider_type: env
      identifier: OPENAI_API_KEY

ai:
  profiles:
    - name: shopify_sales_demo_analyst
      description: Demo analyst across Shopify sync, Postgres sales, CSV planning, and weather API data.
      default: true
      availability:
        runtime: true
        mcp: true
      data_scope:
        semantic_models: [shopify_sales_demo]
        datasets:
          - shopify_products
          - shopify_product_variants
          - shopify_product_options
          - shopify_product_images
          - shopify_custom_collections
          - shopify_smart_collections
          - shopify_collects
          - shopify_locations
          - shopify_price_rules
          - sales_customers
          - sales_orders
          - sales_order_items
          - product_campaign_plan
        query_policy: semantic_preferred
      capabilities:
        source_sql: true
        research:
          enabled: false
        web_search:
          enabled: true
      llm:
        llm_connection: self_hosted_openai
      instructions:
        system: You are a Langbridge analytics agent for the golden Shopify sales demo.
        user: |
          Answer from governed runtime data first. The demo combines Shopify synced catalog data, a seeded Postgres sales database, a local campaign CSV, and an Open-Meteo weather API dataset.
          Use Shopify catalog fields for product identity, Postgres facts for sales performance and CSV fields for planned campaigns.
          Use Web search to get weather context for store locations if relevant, but do not use it for Shopify or sales information.
          Use the numeric semantic measures for price, discount, sales, and plan calculations, as some source fields arrive as strings.
          Use the relationships between datasets to connect product, sales, and campaign information.
          Use the following presentation guidelines when responding:
           - Keep answers concise and focused on the question.
           - Cite the specific semantic measures, dimensions, or datasets used in your analysis.
           - Call out when a question crosses data sources or requires external web search for weather context.
        presentation: |
          When presenting your answer, follow these guidelines:
           - Start with a concise summary of your findings.
           - Include specific data points and cite the relevant semantic measures, dimensions, or datasets.
           - If you used web search for weather context, include a brief summary of the relevant weather information and how it relates to the question.
           - If the question requires connecting information across datasets, clearly explain how you linked the data together using the defined relationships.
           - Avoid using raw Shopify or sales data if it is not relevant to the question.
      orchestration:
        policy: balanced_governed
