version: 1

runtime:
  mode: local
  migrations:
    auto_apply: true
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/execution.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: fx_http_demo
    type: BASIC_HTTP
    description: Basic HTTP connector example for latest USD exchange rates.
    connection:
      api_base_url: https://open.er-api.com/v6
      auth_type: none
      timeout_s: 30

  - name: shopify_demo
    type: shopify
    description: Shopify synced dataset example using explicit resource paths.
    connection: {}
    secrets:
      shop_domain:
        provider_type: env
        identifier: SHOPIFY_SHOP_DOMAIN
      access_token:
        provider_type: env
        identifier: SHOPIFY_ACCESS_TOKEN

  - name: planning_files
    type: local_filesystem
    description: File-backed planning connector for monthly channel spend targets.
    connection: {}

datasets:
  - name: latest_usd_rates_snapshot
    label: Latest USD Rates Snapshot
    description: Raw latest exchange-rate payload for base USD.
    connector: fx_http_demo
    source:
      kind: request
      request:
        method: get
        path: /latest
        params:
          base: USD
      extraction:
        type: json
        options:
          path: rates
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH
        sync_on_start: true
        cadence: 1h

  - name: shopify_synced_customers
    description: Synced parent dataset for customers with explicit 1:1 address flattening.
    connector: shopify_demo
    source:
      kind: resource
      resource: customers
      flatten:
        - default_address
    materialization:
      mode: synced
      sync:
        strategy: INCREMENTAL

  - name: shopify_synced_product_options
    description: Synced explicit child dataset for the 1:many `products.options` path.
    connector: shopify_demo
    source:
      kind: resource
      resource: products.options
    materialization:
      mode: synced
      sync:
        strategy: INCREMENTAL

  - name: shopify_synced_price_rules
    description: Synced dynamic Shopify resource using an explicit dataset-owned resource path.
    connector: shopify_demo
    source:
      kind: resource
      resource: price_rules
    materialization:
      mode: synced
      sync:
        strategy: FULL_REFRESH

  - name: channel_spend_targets
    label: Channel Spend Targets
    description: Monthly channel spend plan and demand targets from a local CSV file.
    connector: planning_files
    materialization:
      mode: live
    tags: [growth, finance, planning]
    source:
      kind: file
      path: ./data/channel_spend_targets.csv
      format: csv
      header: true

llm_connections:
  - name: self_hosted_openai
    provider: openai
    model: gpt-5.5
    default: true
    api_key_secret:
      provider_type: env
      identifier: OPENAI_API_KEY
