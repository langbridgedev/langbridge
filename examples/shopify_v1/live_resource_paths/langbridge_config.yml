version: 1

runtime:
  mode: local
  metadata_store:
    type: sqlite
    path: .langbridge/metadata.db
  execution:
    engine: duckdb
    duckdb:
      path: .langbridge/duckdb/runtime.duckdb
      temp_directory: .langbridge/tmp
      threads: 4

connectors:
  - name: shopify_demo
    type: shopify
    description: Shopify live dataset example using explicit resource paths.
    connection: {}
    secrets:
      shop_domain:
        provider_type: env
        identifier: SHOPIFY_SHOP_DOMAIN
      access_token:
        provider_type: env
        identifier: SHOPIFY_ACCESS_TOKEN

datasets:
  - name: shopify_live_customers
    description: Live parent dataset for customers with explicit 1:1 address flattening.
    connector: shopify_demo
    materialization_mode: live
    source:
      resource: customers
      flatten:
        - default_address

  - name: shopify_live_customer_addresses
    description: Live explicit child dataset for the 1:1 `customers.default_address` path.
    connector: shopify_demo
    materialization_mode: live
    source:
      resource: customers.default_address

  - name: shopify_live_products
    description: Live parent dataset for products with explicit 1:many options flattening.
    connector: shopify_demo
    materialization_mode: live
    source:
      resource: products

  - name: shopify_live_product_options
    description: Live explicit child dataset for the 1:many `products.options` path.
    connector: shopify_demo
    materialization_mode: live
    source:
      resource: products.options
