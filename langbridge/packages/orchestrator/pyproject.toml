[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-orchestrator"
version = "0.1.0"
description = "Agent orchestration and workflows"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "langbridge-contracts==0.1.0",
  "langbridge-common==0.1.0",
  "langbridge-semantic==0.1.0",
  "langbridge-connectors==0.1.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.orchestrator*"]
