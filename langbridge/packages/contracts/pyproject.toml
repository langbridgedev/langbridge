[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-contracts"
version = "0.1.0"
description = "Runtime-owned contracts and schemas"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "langbridge==0.1.0",
  "langbridge-common==0.1.0",
  "langbridge-messaging==0.1.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.contracts*"]
