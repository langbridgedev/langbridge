[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-runtime"
version = "0.1.0"
description = "Langbridge execution runtime"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "langbridge==0.1.0",
  "langbridge-contracts==0.1.0",
  "langbridge-common==0.1.0",
  "langbridge-connectors==0.1.0",
  "langbridge-federation==0.1.0",
  "langbridge-semantic==0.1.0",
  "langbridge-orchestrator==0.1.0",
  "langbridge-messaging==0.1.0",
  "fastapi[standard]==0.117.1",
  "uvicorn[standard]==0.32.0",
  "duckdb==1.2.1",
  "pyarrow==11.0.0",
  "faiss-cpu==1.8.0",
  "mcp==1.17.0",
  "qdrant-client==1.9.1",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.runtime*"]
