[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-messaging"
version = "0.1.0"
description = "Messaging contracts and brokers"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "langbridge==0.1.0",
  "langbridge-common==0.1.0",
  "redis>=5.0.0",
  "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.messaging*"]
