[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-connectors"
version = "0.1.0"
description = "Connector adapters"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "langbridge==0.1.0",
  "langbridge-common==0.1.0",
  "snowflake-connector-python==3.18.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.connectors*"]
