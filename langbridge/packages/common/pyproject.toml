[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-common"
version = "0.1.0"
description = "Shared Langbridge types and utilities"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.0.0",
  "pydantic-settings>=2.0.0",
  "sqlalchemy>=2.0.0",
  "python-jose[cryptography]>=3.3.0",
  "httpx>=0.27,<1",
  "PyYAML>=6.0.0",
  "authlib>=1.3.0",
  "psycopg[binary]>=3.2.0",
  "itsdangerous>=2.2.0",
  "cryptography>=46.0.0",
  "sqlglot>=27.0.0",
  "openai>=2.2.0",
  "anthropic>=0.39.0",
  "langchain-openai>=0.1.0",
  "langchain-anthropic>=0.1.0",
  "langchain>=0.3.0",
  "pandas>=2.3.0",
  "numpy>=1.26.0",
  "pyarrow>=19.0.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.common*"]
