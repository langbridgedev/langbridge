[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-semantic"
version = "0.1.0"
description = "Semantic compiler and query handling"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "langbridge==0.1.0",
  "langbridge-contracts==0.1.0",
  "langbridge-common==0.1.0",
  "langbridge-connectors==0.1.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.semantic*"]
