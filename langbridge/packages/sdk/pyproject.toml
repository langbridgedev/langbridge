[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-sdk"
version = "0.1.0"
description = "Langbridge SDK"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.27,<1",
  "langbridge==0.1.0",
  "langbridge-common==0.1.0",
  "langbridge-contracts==0.1.0",
  "langbridge-runtime==0.1.0",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.sdk*"]
