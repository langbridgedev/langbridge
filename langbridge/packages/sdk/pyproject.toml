[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langbridge-sdk"
version = "0.1.0"
description = "Langbridge SDK"
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.27,<1",
  "langbridge-common @ file:../common",
  "langbridge-runtime @ file:../runtime",
]

[tool.setuptools.packages.find]
where = ["../../.."]
include = ["langbridge.packages.sdk*"]
