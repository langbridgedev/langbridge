version: "3.9"
services:
  migrate:
    image: ghcr.io/langbridgedev/langbridge-cloud-migrate:latest
    container_name: langbridge-migrate
    env_file:
      - ./langbridge/.env
    environment:
      ENVIRONMENT: development
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: langbridge
      POSTGRES_PASSWORD: langbridge
      POSTGRES_DB: langbridge
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
  api:
    image: ghcr.io/langbridgedev/langbridge-cloud-api:latest
    container_name: langbridge-api
    env_file:
      - ./langbridge/.env
    environment:
      ENVIRONMENT: development
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: langbridge
      POSTGRES_PASSWORD: langbridge
      POSTGRES_DB: langbridge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EDGE_RUNTIME_JWT_SECRET: ${EDGE_RUNTIME_JWT_SECRET:-dev-edge-runtime-secret}
      DEFAULT_EXECUTION_MODE: ${DEFAULT_EXECUTION_MODE:-hosted}
      FEDERATION_ARTIFACT_DIR: ${FEDERATION_ARTIFACT_DIR:-/tmp/langbridge-federation}
      FEDERATION_BROADCAST_THRESHOLD_BYTES: ${FEDERATION_BROADCAST_THRESHOLD_BYTES:-67108864}
      FEDERATION_PARTITION_COUNT: ${FEDERATION_PARTITION_COUNT:-8}
      FEDERATION_STAGE_MAX_RETRIES: ${FEDERATION_STAGE_MAX_RETRIES:-2}
      FEDERATION_STAGE_PARALLELISM: ${FEDERATION_STAGE_PARALLELISM:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
  worker:
    build:
      context: .
      dockerfile: langbridge/Dockerfile.worker
    container_name: langbridge-worker
    env_file:
      - ./langbridge/.env-worker
    environment:
      ENVIRONMENT: development
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: langbridge
      POSTGRES_PASSWORD: langbridge
      POSTGRES_DB: langbridge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_POLL_INTERVAL: 2.0
      WORKER_METRICS_PORT: 9101
      FEDERATION_ARTIFACT_DIR: ${FEDERATION_ARTIFACT_DIR:-/tmp/langbridge-federation}
      FEDERATION_BROADCAST_THRESHOLD_BYTES: ${FEDERATION_BROADCAST_THRESHOLD_BYTES:-67108864}
      FEDERATION_PARTITION_COUNT: ${FEDERATION_PARTITION_COUNT:-8}
      FEDERATION_STAGE_MAX_RETRIES: ${FEDERATION_STAGE_MAX_RETRIES:-2}
      FEDERATION_STAGE_PARALLELISM: ${FEDERATION_STAGE_PARALLELISM:-4}
    command: ["python", "-m", "langbridge.apps.runtime_worker.main", "--reload"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./:/app
  customer-worker:
    build:
      context: .
      dockerfile: langbridge/Dockerfile.worker
    profiles:
      - customer-runtime
    env_file:
      - ./langbridge/.env
    environment:
      WORKER_EXECUTION_MODE: customer_runtime
      WORKER_POLL_INTERVAL: 2.0
      EDGE_API_BASE_URL: http://api:8000/api/v1
      EDGE_REGISTRATION_TOKEN: ${EDGE_REGISTRATION_TOKEN:-replace-me}
      WORKER_RUNTIME_TAGS: "semantic_query,region:local"
      WORKER_RUNTIME_CAPABILITIES: '{"message_types":["semantic_query_request"]}'
      WORKER_BROKER: redis
    command: ["python", "-m", "langbridge.apps.runtime_worker.main"]
    depends_on:
      api:
        condition: service_started
  db:
    image: postgres:16-alpine
    container_name: langbridge-db
    environment:
      POSTGRES_USER: langbridge
      POSTGRES_PASSWORD: langbridge
      POSTGRES_DB: langbridge
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langbridge"]
      interval: 10s
      timeout: 5s
      retries: 5
  federation-db-a:
    image: postgres:16-alpine
    profiles:
      - federation-sources
    environment:
      POSTGRES_USER: federation_a
      POSTGRES_PASSWORD: federation_a
      POSTGRES_DB: federation_a
    ports:
      - "55433:5432"
    volumes:
      - federation_pg_a_data:/var/lib/postgresql/data
  federation-db-b:
    image: postgres:16-alpine
    profiles:
      - federation-sources
    environment:
      POSTGRES_USER: federation_b
      POSTGRES_PASSWORD: federation_b
      POSTGRES_DB: federation_b
    ports:
      - "55434:5432"
    volumes:
      - federation_pg_b_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: langbridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: langbridge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
volumes:
  pg_data:
  federation_pg_a_data:
  federation_pg_b_data:
  redis_data:
  qdrant_data:
