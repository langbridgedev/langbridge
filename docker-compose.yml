services:
  runtime-host:
    profiles:
      - host
    build:
      context: .
      dockerfile: docker/Dockerfile
    command:
      - serve
      - --config
      - /config/langbridge_config.yml
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      OTEL_SDK_DISABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./examples/sdk/semantic_query/langbridge_config.yml:/config/langbridge_config.yml:ro
      - ./examples/sdk/semantic_query/example.db:/config/example.db
      - runtime_host_state:/config/.langbridge
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: langbridge-qdrant
    profiles:
      - vector
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  runtime_host_state:
  qdrant_data:
